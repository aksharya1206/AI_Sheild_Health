<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Report Analyzer - SmartHealth</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- GLOBAL STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f0f9ff; color: #1e293b; line-height: 1.6; }

        /* --- GLOSSY NAVBAR (Matches Home Page) --- */
        nav.navbar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(13, 148, 136, 0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .logo { font-size: 22px; font-weight: 800; color: #0d9488; }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: #475569; font-weight: 600; font-size: 14px; transition: 0.3s; }
        .nav-links a:hover { color: #0d9488; }

        /* --- HERO AREA --- */
        .container { max-width: 900px; margin: 50px auto; padding: 0 20px; }
        .header-section { text-align: center; margin-bottom: 40px; }
        h1 { 
            font-size: 38px; font-weight: 800; 
            background: linear-gradient(135deg, #0d9488 0%, #0ea5e9 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #64748b; font-weight: 500; font-size: 1.1rem; margin-top: 10px; }

        /* --- GLASSMORPHISM FORM CARD --- */
        .form-section {
            background: white; padding: 40px; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: 600; margin-bottom: 10px; font-size: 14px; color: #475569; }
        
        input[type="text"], input[type="file"] {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 2px solid #f1f5f9; background: #f8fafc; font-size: 1rem;
        }
        input:focus { border-color: #0d9488; outline: none; background: white; }

        /* --- PREMIUM BUTTON --- */
        #analyzeBtn {
            width: 100%; background: linear-gradient(135deg, #0d9488 0%, #0ea5e9 100%);
            color: white; padding: 18px; border: none; border-radius: 15px;
            font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(13, 148, 136, 0.2);
        }
        #analyzeBtn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(13, 148, 136, 0.3); }

        /* --- RESULTS AREA --- */
        #resultsContainer { margin-top: 40px; }
        .analysis-result { background: white; padding: 30px; border-radius: 24px; border: 1px solid #e2e8f0; }
        
        /* CSS for the colored cards we added in Python */
        .analysis-card { margin-bottom: 15px; transition: 0.2s; }
        .critical-card { border-left-color: #ef4444 !important; background-color: #fef2f2 !important; }
        .warning-card { border-left-color: #f59e0b !important; background-color: #fffbeb !important; }
        .normal-card { border-left-color: #10b981 !important; background-color: #f0fdf4 !important; }

        .loading { text-align: center; color: #0ea5e9; font-weight: 700; display: none; margin-top: 15px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">🏥 SmartHealth AI</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/patient-dashboard">Dashboard</a></li>
            <li><a href="/find-doctor">Doctors</a></li>
            <li><a href="/report-analyzer">AI Analyzer</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1>AI Medical Report Analyzer</h1>
            <p class="subtitle">Experience clinical-grade analysis powered by Llama 3.2</p>
        </div>

        <div class="form-section">
            <form id="reportForm">
                <div class="form-group">
                    <label>Patient ID (Optional)</label>
                    <input type="text" id="patientId" placeholder="e.g. PH-10234">
                </div>

                <div class="form-group">
                    <label>Medical Report (PDF Format)</label>
                    <input type="file" id="reportFile" accept=".pdf" required>
                </div>

                <button type="submit" id="analyzeBtn">Analyze Report Now →</button>
                <div class="loading" id="loading">🧬 AI is processing your data...</div>
            </form>
        </div>

        <div id="resultsContainer" style="display: none;">
            <div class="analysis-result">
                <h3 style="margin-bottom: 20px; color: #0d9488;">📋 Expert Analysis Results</h3>
                <div id="analysisText"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('reportFile');
            const loading = document.getElementById('loading');
            const results = document.getElementById('resultsContainer');
            
            loading.style.display = 'block';
            results.style.display = 'none';

            const formData = new FormData();
            formData.append('report', fileInput.files[0]);
            formData.append('patient_id', document.getElementById('patientId').value);

            try {
                // IMPORTANT: Ensure this route matches your app.py (@app.route('/analyze-report'))
                const response = await fetch('/analyze-report', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('analysisText').innerHTML = data.analysis;
                    results.style.display = 'block';
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Connection failed. Is Ollama running?');
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
